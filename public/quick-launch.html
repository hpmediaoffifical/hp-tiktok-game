<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🚀 Khởi động nhanh — HP Action LIVE</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <style>
    * { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0;
        background: #0b0d12;
        color: #e3e7f1;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        height: 100%;
        overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    /* Drag region — kéo cửa sổ qua khu vực header */
    header {
        -webkit-app-region: drag;
        background: linear-gradient(135deg, #161a23 0%, #1b1525 100%);
        border-bottom: 1px solid #2a3046;
        padding: 12px 14px 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }
    header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        flex: 1;
        background: linear-gradient(90deg, #ff6b3d, #ff3d7f);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    header .actions {
        -webkit-app-region: no-drag;
        display: flex; align-items: center; gap: 4px;
    }
    .hdr-btn {
        background: transparent;
        border: 1px solid #2a3046;
        color: #c8cee0;
        padding: 5px 9px;
        border-radius: 6px;
        font-size: 11px;
        cursor: pointer;
        transition: background .15s ease, border-color .15s ease;
    }
    .hdr-btn:hover { background: #1f2533; border-color: #3a4359; }
    .hdr-btn.is-on { background: #2a3a55; color: #7fb6ff; border-color: #3a5a85; }
    .hdr-btn .ico { margin-right: 3px; }

    main {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 9px;
    }
    .hint {
        font-size: 11px;
        color: #6b7385;
        margin: 0 0 4px;
    }

    /* Card grid — single column, compact */
    .ql-card {
        background: #161a23;
        border: 1px solid #262c3c;
        border-radius: 10px;
        padding: 10px 11px;
        display: flex; flex-direction: column; gap: 8px;
        transition: border-color .15s ease, box-shadow .15s ease;
    }
    .ql-card.is-on   { border-color: #23a85f; box-shadow: 0 0 0 1px #23a85f22; }
    .ql-card.is-off  { opacity: 0.88; }
    .ql-card.is-live {
        border-color: #ff6b3d;
        box-shadow: 0 0 0 2px #ff6b3d44, 0 4px 14px rgba(255, 107, 61, 0.25);
        background: linear-gradient(135deg, #1d1a23 0%, #2a1822 100%);
    }

    .ql-card-head { display: flex; align-items: center; gap: 9px; }
    .ql-card-ico { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .ql-card-meta { flex: 1; min-width: 0; }
    .ql-card-name { font-size: 13px; font-weight: 700; color: #e3e7f1; line-height: 1.2; }
    .ql-card-state { font-size: 10px; display: inline-flex; align-items: center; gap: 4px; margin-top: 2px; font-weight: 600; }
    .ql-card-state.on   { color: #34d77a; }
    .ql-card-state.off  { color: #8b93a8; }
    .ql-card-state.live { color: #ff8a3d; }
    .ql-card-state .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 5px currentColor;
    }
    .ql-card-state.live .dot { animation: ql-pulse 1.2s ease-in-out infinite; }
    @keyframes ql-pulse {
        0%, 100% { transform: scale(1);   box-shadow: 0 0 5px currentColor; }
        50%      { transform: scale(1.4); box-shadow: 0 0 12px currentColor; }
    }

    .ql-card-actions { display: grid; grid-template-columns: 1fr 1fr auto; gap: 6px; }
    .ql-btn {
        border: 0; border-radius: 6px;
        padding: 7px 8px;
        font-size: 11px; font-weight: 700;
        cursor: pointer;
        color: #fff;
        transition: background .12s ease, transform .05s ease;
    }
    .ql-btn:active { transform: scale(0.97); }
    .ql-btn-start { background: #23a85f; }
    .ql-btn-start:hover { background: #2bbf6e; }
    .ql-btn-start:disabled { background: #1f3a2a; color: #6b7785; cursor: not-allowed; }
    .ql-btn-stop  { background: #c63d3d; }
    .ql-btn-stop:hover  { background: #d94747; }
    .ql-btn-stop:disabled  { background: #3a2026; color: #6b7785; cursor: not-allowed; }
    .ql-btn-reset {
        background: #3a4359; color: #c8cee0;
        padding: 7px 10px;
        min-width: 36px;
    }
    .ql-btn-reset:hover { background: #4a5470; }
    .ql-btn-reset:disabled { background: #1f2533; color: #5b6378; cursor: not-allowed; }

    footer {
        flex-shrink: 0;
        padding: 8px 14px;
        font-size: 10px;
        color: #5b6378;
        background: #0e1119;
        border-top: 1px solid #1f2533;
        text-align: center;
        font-style: italic;
    }
    .conn-state {
        display: inline-flex; align-items: center; gap: 4px;
        font-style: normal;
    }
    .conn-state .dot { width: 7px; height: 7px; border-radius: 50%; background: #c63d3d; }
    .conn-state.connected .dot { background: #23a85f; box-shadow: 0 0 5px #23a85f; }

    /* Scrollbar gọn */
    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: #2a3046; border-radius: 3px; }
    main::-webkit-scrollbar-thumb:hover { background: #3a4359; }
    </style>
</head>
<body>
    <header>
        <h1>🚀 Khởi động nhanh</h1>
        <div class="actions">
            <button id="btn-pin" class="hdr-btn is-on" title="Luôn hiện trên cùng (Always on top)"><span class="ico">📌</span><span>Pin</span></button>
            <button id="btn-close" class="hdr-btn" title="Đóng cửa sổ">✕</button>
        </div>
    </header>
    <main>
        <p class="hint"><b>▶ Bắt đầu</b> · <b>⏸ Dừng</b> (giữ tiến trình) · <b>↺</b> Reset (chạy lại từ đầu).</p>
        <div id="grid"></div>
    </main>
    <footer>
        <span id="conn-state" class="conn-state"><span class="dot"></span><span id="conn-text">Đang kết nối…</span></span>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    (() => {
        const gridEl    = document.getElementById('grid');
        const pinBtn    = document.getElementById('btn-pin');
        const closeBtn  = document.getElementById('btn-close');
        const connEl    = document.getElementById('conn-state');
        const connTxt   = document.getElementById('conn-text');

        // Whitelist game ổn định — phải khớp STABLE_GAMES trong app.js
        const STABLE_IDS = ['thuytinh', 'caro', 'votecomment', 'level-quest', 'timer', 'liveTranslate'];
        const LT_LS_KEY  = 'hp-live-translate-tool-enabled';

        let games = [];   // [{ id, name, icon, config, virtual }]
        // running[gameId] = true khi game đang trong phiên active (vote chạy đồng hồ, timer chạy,
        // quest đếm lùi, caro mở ghi danh, liveTranslate đang dịch+TTS). Subscribe socket để sync.
        const running = Object.create(null);

        // Socket — listen gameConfig updates để sync khi user toggle ở app chính
        const socket = io({ reconnection: true, reconnectionDelay: 600 });
        socket.on('connect',    () => { connEl.classList.add('connected');    connTxt.textContent = 'Đã kết nối app'; });
        socket.on('disconnect', () => { connEl.classList.remove('connected'); connTxt.textContent = 'Mất kết nối — đang thử lại…'; });
        socket.on('gameConfig', ({ gameId, config }) => {
            const g = games.find(x => x.id === gameId);
            if (!g) return;
            g.config = config;
            updateCard(gameId);
        });

        // Subscribe các socket event báo trạng thái Đang chạy của từng game:
        //   votecomment:state.active     (server emit khi start/stop/timer hết giờ)
        //   timer:state.running          (iframe THỜI GIAN broadcast khi start/pause/resume)
        //   levelquest:state.timerActive (iframe LEVEL QUEST broadcast khi toggleQuestTimer)
        //   quickLaunch:status           (app chính emit cho caro + liveTranslate)
        function setRunning(gameId, isRunning) {
            const prev = !!running[gameId];
            const next = !!isRunning;
            if (prev === next) return;
            running[gameId] = next;
            updateCard(gameId);
        }
        socket.on('votecomment:state', (s) => setRunning('votecomment', !!s?.active));
        socket.on('timer:state',       (s) => setRunning('timer',       !!s?.running));
        socket.on('levelquest:state',  (s) => setRunning('level-quest', !!s?.timerActive));
        socket.on('quickLaunch:status', ({ gameId, running: r }) => setRunning(gameId, r));

        const isEnabled = (g) => !g.config || !('enabled' in g.config) || g.config.enabled !== false;

        async function loadGames() {
            try {
                const r = await fetch('/api/games');
                const list = await r.json();
                games = list.filter(g => STABLE_IDS.includes(g.id));
                // Thêm liveTranslate virtual (giống app.js loadGames)
                games.push({
                    id: 'liveTranslate',
                    name: 'DỊCH VÀ ĐỌC LIVE',
                    icon: '🌐',
                    virtual: true,
                    config: { enabled: localStorage.getItem(LT_LS_KEY) !== 'false' }
                });
                // Sắp xếp theo STABLE_IDS order (giữ thứ tự nhất quán với app chính)
                games.sort((a, b) => STABLE_IDS.indexOf(a.id) - STABLE_IDS.indexOf(b.id));
                render();
            } catch (e) {
                connTxt.textContent = 'Không tải được danh sách game';
            }
        }

        function render() {
            gridEl.innerHTML = '';
            for (const g of games) gridEl.appendChild(buildCard(g));
        }

        function stateOf(g) {
            // Tách 3 trạng thái rõ ràng:
            //   running = đang chạy phiên thật của game (vd vote đang đếm giờ)
            //   ready   = sidebar ⏻ ON, chưa start session
            //   off     = sidebar ⏻ OFF
            const enabled = isEnabled(g);
            if (running[g.id]) return { cls: 'live', label: 'Đang chạy' };
            if (enabled)       return { cls: 'on',   label: 'Sẵn sàng' };
            return                       { cls: 'off',  label: 'Đã TẮT ở Thư viện' };
        }
        function buildCard(g) {
            const st = stateOf(g);
            const card = document.createElement('div');
            card.className = 'ql-card is-' + st.cls;
            card.dataset.gameId = g.id;
            card.innerHTML = `
                <div class="ql-card-head">
                    <span class="ql-card-ico">${g.icon}</span>
                    <div class="ql-card-meta">
                        <div class="ql-card-name">${escapeHtml(g.name)}</div>
                        <span class="ql-card-state ${st.cls}">
                            <span class="dot"></span>
                            <span class="state-txt">${st.label}</span>
                        </span>
                    </div>
                </div>
                <div class="ql-card-actions">
                    <button class="ql-btn ql-btn-start" data-act="start" title="Bắt đầu / tiếp tục phiên">▶ Bắt đầu</button>
                    <button class="ql-btn ql-btn-stop"  data-act="stop"  title="Dừng / tạm dừng phiên (giữ tiến trình)">⏸ Dừng</button>
                    <button class="ql-btn ql-btn-reset" data-act="reset" title="Reset — chạy lại từ đầu, xóa tiến trình">↺</button>
                </div>
            `;
            card.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-act]');
                if (!btn) return;
                // 3 nút là action thật của game (Bắt đầu/Dừng/Reset). Reset = restart from scratch,
                // khác Dừng (chỉ pause giữ tiến trình rồi resume khi Bắt đầu lại).
                fireAction(g, btn.dataset.act);
            });
            return card;
        }

        function updateCard(gameId) {
            const card = gridEl.querySelector(`.ql-card[data-game-id="${gameId}"]`);
            const g = games.find(x => x.id === gameId);
            if (!card || !g) return;
            // 3 trạng thái: live (đang chạy phiên) / on (sẵn sàng) / off (tắt ở Thư viện)
            const st = stateOf(g);
            card.classList.remove('is-live', 'is-on', 'is-off');
            card.classList.add('is-' + st.cls);
            const state = card.querySelector('.ql-card-state');
            const stateTxt = card.querySelector('.state-txt');
            if (state) state.className = 'ql-card-state ' + st.cls;
            if (stateTxt) stateTxt.textContent = st.label;
        }

        function fireAction(g, action) {
            // Visual flash để user biết click đã ghi nhận (action chạy async qua socket → app chính)
            const card = gridEl.querySelector(`.ql-card[data-game-id="${g.id}"]`);
            const btnSel = { start: '.ql-btn-start', stop: '.ql-btn-stop', reset: '.ql-btn-reset' }[action];
            const btn = btnSel ? card?.querySelector(btnSel) : null;
            if (btn) {
                const orig = btn.textContent;
                const flash = { start: '⏳ Đang bắt đầu…', stop: '⏳ Đang dừng…', reset: '⏳ Reset…' }[action];
                btn.textContent = flash;
                btn.disabled = true;
                setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 700);
            }
            // Emit cmd → server broadcast → app chính dispatch:
            //   start    Bắt đầu / tiếp tục phiên
            //   stop     Dừng (pause — giữ tiến trình, Bắt đầu sẽ resume)
            //   reset    Reset (xóa tiến trình + restart từ đầu)
            socket.emit('quickLaunch:cmd', { gameId: g.id, action });
        }

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        // Header buttons — bridge tới Electron qua IPC nếu có (electron preload), fallback no-op trên web
        const ipc = (typeof window !== 'undefined' && window.hpQuickLaunch) ? window.hpQuickLaunch : null;
        function applyPinUi(on) {
            pinBtn.classList.toggle('is-on', !!on);
            pinBtn.title = on ? 'Luôn hiện trên cùng — bấm để tắt pin' : 'Bấm để pin trên cùng';
        }
        // Đồng bộ trạng thái pin đã persist từ phiên trước (main process gửi qua IPC)
        ipc?.onInitPin?.(applyPinUi);
        pinBtn.addEventListener('click', () => {
            const next = !pinBtn.classList.contains('is-on');
            applyPinUi(next);
            if (ipc?.setAlwaysOnTop) ipc.setAlwaysOnTop(next);
        });
        closeBtn.addEventListener('click', () => {
            if (ipc?.close) ipc.close();
            else window.close();
        });

        loadGames();
    })();
    </script>
</body>
</html>
