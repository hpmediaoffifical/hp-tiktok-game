<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🚀 Khởi động nhanh — HP Action LIVE</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <style>
    * { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0;
        background: #0b0d12;
        color: #e3e7f1;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        height: 100%;
        overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    /* Drag region — kéo cửa sổ qua khu vực header */
    header {
        -webkit-app-region: drag;
        background: linear-gradient(135deg, #161a23 0%, #1b1525 100%);
        border-bottom: 1px solid #2a3046;
        padding: 12px 14px 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }
    header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        flex: 1;
        background: linear-gradient(90deg, #ff6b3d, #ff3d7f);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    header .actions {
        -webkit-app-region: no-drag;
        display: flex; align-items: center; gap: 4px;
    }
    .hdr-btn {
        background: transparent;
        border: 1px solid #2a3046;
        color: #c8cee0;
        padding: 5px 9px;
        border-radius: 6px;
        font-size: 11px;
        cursor: pointer;
        transition: background .15s ease, border-color .15s ease;
    }
    .hdr-btn:hover { background: #1f2533; border-color: #3a4359; }
    .hdr-btn.is-on { background: #2a3a55; color: #7fb6ff; border-color: #3a5a85; }
    .hdr-btn .ico { margin-right: 3px; }

    main {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 9px;
    }
    .hint {
        font-size: 11px;
        color: #6b7385;
        margin: 0 0 4px;
    }

    /* === Connect card (TikTok) === */
    .conn-card {
        background: linear-gradient(135deg, #18141e 0%, #1f1622 100%);
        border: 1px solid #2a2030;
        border-radius: 10px;
        padding: 10px 11px;
        display: flex; flex-direction: column; gap: 8px;
        position: relative;
    }
    .conn-card.is-live {
        border-color: #ff6b3d;
        box-shadow: 0 0 0 1px #ff6b3d44, 0 3px 12px rgba(255, 107, 61, 0.18);
    }
    .conn-head {
        display: flex; align-items: center; gap: 8px;
        font-size: 12px; font-weight: 700;
    }
    .conn-head .conn-ico { font-size: 15px; }
    .conn-head .conn-status-chip {
        margin-left: auto;
        display: inline-flex; align-items: center; gap: 4px;
        font-size: 10px; font-weight: 700;
        color: #8b93a8;
        padding: 2px 6px;
        border-radius: 4px;
        background: #1a1f2c;
    }
    .conn-head .conn-status-chip.is-live { color: #ff8a3d; background: #2a1a18; }
    .conn-head .conn-status-chip .dot {
        width: 6px; height: 6px; border-radius: 50%; background: currentColor;
        box-shadow: 0 0 5px currentColor;
    }
    .conn-head .conn-status-chip.is-live .dot { animation: ql-pulse 1.2s ease-in-out infinite; }

    .conn-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        position: relative;
    }
    .conn-input-wrap { position: relative; }
    .conn-input {
        width: 100%;
        background: #0e1119;
        border: 1px solid #2a3046;
        border-radius: 6px;
        color: #e3e7f1;
        padding: 7px 9px;
        font-size: 12px;
        font-family: inherit;
        outline: none;
    }
    .conn-input::placeholder { color: #5b6378; }
    .conn-input:focus { border-color: #4a5a7a; }
    .conn-btn {
        border: 0; border-radius: 6px;
        padding: 7px 12px;
        font-size: 12px; font-weight: 700;
        cursor: pointer;
        color: #fff;
        background: #23a85f;
        transition: background .12s ease, transform .05s ease;
        white-space: nowrap;
    }
    .conn-btn:active { transform: scale(0.97); }
    .conn-btn:hover { background: #2bbf6e; }
    .conn-btn:disabled { background: #1f3a2a; color: #6b7785; cursor: not-allowed; }
    .conn-btn.is-disc { background: #c63d3d; }
    .conn-btn.is-disc:hover { background: #d94747; }

    /* Suggestion dropdown */
    .conn-sugg {
        position: absolute;
        top: calc(100% + 3px);
        left: 0; right: 0;
        background: #0e1119;
        border: 1px solid #2a3046;
        border-radius: 6px;
        max-height: 180px;
        overflow-y: auto;
        z-index: 50;
        display: none;
        box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .conn-sugg.show { display: block; }
    .conn-sugg-item {
        display: flex; align-items: center; gap: 6px;
        padding: 6px 9px;
        font-size: 12px;
        cursor: pointer;
        transition: background .1s ease;
    }
    .conn-sugg-item:hover, .conn-sugg-item.is-active {
        background: #1c2233;
    }
    .conn-sugg-item .sugg-name { flex: 1; color: #c8cee0; }
    .conn-sugg-item .sugg-name b { color: #ff8a3d; font-weight: 700; }
    .conn-sugg-item .sugg-del {
        background: transparent; border: 0;
        color: #6b7385;
        cursor: pointer;
        font-size: 14px;
        padding: 0 4px;
        border-radius: 3px;
        line-height: 1;
    }
    .conn-sugg-item .sugg-del:hover { color: #ff6b6b; background: #2a1a1f; }
    .conn-sugg::-webkit-scrollbar { width: 5px; }
    .conn-sugg::-webkit-scrollbar-thumb { background: #2a3046; border-radius: 3px; }

    .conn-err {
        font-size: 11px;
        color: #ff8080;
        margin: 2px 0 0;
        line-height: 1.35;
        display: none;
    }
    .conn-err.show { display: block; }

    /* Card grid — single column, compact */
    .ql-card {
        background: #161a23;
        border: 1px solid #262c3c;
        border-radius: 10px;
        padding: 10px 11px;
        display: flex; flex-direction: column; gap: 8px;
        transition: border-color .15s ease, box-shadow .15s ease;
    }
    .ql-card.is-on   { border-color: #23a85f; box-shadow: 0 0 0 1px #23a85f22; }
    .ql-card.is-off  { opacity: 0.88; }
    .ql-card.is-live {
        border-color: #ff6b3d;
        box-shadow: 0 0 0 2px #ff6b3d44, 0 4px 14px rgba(255, 107, 61, 0.25);
        background: linear-gradient(135deg, #1d1a23 0%, #2a1822 100%);
    }

    .ql-card-head { display: flex; align-items: center; gap: 9px; }
    .ql-card-ico { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .ql-card-meta { flex: 1; min-width: 0; }
    .ql-card-name { font-size: 13px; font-weight: 700; color: #e3e7f1; line-height: 1.2; }
    .ql-card-state { font-size: 10px; display: inline-flex; align-items: center; gap: 4px; margin-top: 2px; font-weight: 600; }
    .ql-card-state.on   { color: #34d77a; }
    .ql-card-state.off  { color: #8b93a8; }
    .ql-card-state.live { color: #ff8a3d; }
    .ql-card-state .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 5px currentColor;
    }
    .ql-card-state.live .dot { animation: ql-pulse 1.2s ease-in-out infinite; }
    @keyframes ql-pulse {
        0%, 100% { transform: scale(1);   box-shadow: 0 0 5px currentColor; }
        50%      { transform: scale(1.4); box-shadow: 0 0 12px currentColor; }
    }

    /* Toggle nút Bắt đầu/Dừng gộp thành 1 icon, ↺ Reset bên cạnh */
    .ql-card-actions { display: grid; grid-template-columns: 1fr auto; gap: 6px; }
    .ql-btn {
        border: 0; border-radius: 6px;
        padding: 8px 8px;
        font-size: 13px; font-weight: 700;
        cursor: pointer;
        color: #fff;
        transition: background .12s ease, transform .05s ease;
        display: inline-flex; align-items: center; justify-content: center;
        gap: 4px;
        line-height: 1;
    }
    .ql-btn:active { transform: scale(0.97); }
    .ql-btn:disabled { cursor: not-allowed; opacity: 0.55; }
    /* Toggle: state ▶ (chưa chạy → bắt đầu) màu xanh; state ⏸ (đang chạy → dừng) màu cam */
    .ql-btn-toggle.is-play   { background: #23a85f; }
    .ql-btn-toggle.is-play:hover   { background: #2bbf6e; }
    .ql-btn-toggle.is-pause  { background: #d97a2b; }
    .ql-btn-toggle.is-pause:hover  { background: #e58a3a; }
    .ql-btn-reset {
        background: #3a4359; color: #c8cee0;
        padding: 8px 12px;
        min-width: 42px;
        font-size: 14px;
    }
    .ql-btn-reset:hover { background: #4a5470; }

    /* ===== Bố cục danh sách game — mỗi game = 1 ô độc lập, LUÔN 1 game/hàng (giống taskbar) ===== */
    #grid { display: flex; flex-direction: column; gap: 8px; }
    /* Card gọn — bo sát viền trên/dưới. DỌC: 1 HÀNG NGANG (icon+tên bên trái, nút dồn PHẢI) → hết trống */
    .ql-card { padding: 7px 9px; gap: 8px; flex-direction: row; align-items: center; }
    .ql-card-head { flex: 1 1 auto; min-width: 0; }
    .ql-card-actions { flex: 0 0 auto; }
    /* Tên dài (vd Dịch Thuật LIVE) → 1 dòng + "…", trạng thái cũng 1 dòng → ô đều nhau */
    .ql-card-meta { min-width: 0; }
    .ql-card-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ql-card-state { min-width: 0; }
    .ql-card-state .state-txt { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* DỌC: nút ▶/⏸ NGẮN lại (không kéo full ngang) cho gọn — như ảnh mẫu */
    .ql-card-actions { display: flex; gap: 6px; align-items: center; }
    .ql-btn-toggle { flex: 0 0 auto; min-width: 58px; padding: 7px 18px; }
    .ql-btn-reset  { flex: 0 0 auto; }

    /* Ô nhập + nút Kết nối TikTok gọn lại */
    .conn-input { padding: 6px 9px; }
    .conn-btn { padding: 6px 12px; }

    /* ===== NGANG: cửa sổ rộng & thấp → Kết nối + các ô game NẰM TRÊN 1 HÀNG NGANG, cuộn ngang ===== */
    body.layout-ngang main {
        flex-direction: row; flex-wrap: wrap; align-items: flex-start; align-content: flex-start;
        gap: 8px; overflow-x: hidden; overflow-y: auto; padding: 10px 12px;
    }
    body.layout-ngang .hint { display: none; }
    /* Kết nối TikTok: cùng hàng với game, NỀN MÀU KHÁC để phân biệt */
    body.layout-ngang #conn-card {
        flex: 0 0 230px;
        background: linear-gradient(135deg, #122031, #16283c);
        border-color: #2c4a6e;
    }
    /* #grid "tàng hình" để các ô game trở thành flex-item của main → WRAP CHUNG với Kết nối,
       cửa sổ hẹp thì tự xuống hàng (không đè, không tràn ngang). */
    body.layout-ngang #grid { display: contents; }
    /* Ô game ĐỀU NHAU, cố định, dạng tile DỌC (icon+tên trên, nút dưới) như ảnh 3 */
    body.layout-ngang .ql-card {
        flex: 0 0 150px; width: 150px; overflow: hidden;
        flex-direction: column; align-items: stretch;
    }
    body.layout-ngang .ql-card-head { flex: 0 0 auto; }
    body.layout-ngang .ql-card-ico { font-size: 19px; }
    body.layout-ngang .ql-card-name { font-size: 12px; }
    /* Ngang: nút ▶ lấp đầy bề ngang ô (như ảnh 3) */
    body.layout-ngang .ql-card-actions { display: grid; grid-template-columns: 1fr auto; }
    body.layout-ngang .ql-btn-toggle { min-width: 0; padding: 7px 8px; }
    /* cuộn gọn (khi wrap nhiều hàng vượt chiều cao) */
    body.layout-ngang main::-webkit-scrollbar { width: 7px; height: 7px; }
    body.layout-ngang main::-webkit-scrollbar-thumb { background: #2a3046; border-radius: 3px; }

    footer {
        flex-shrink: 0;
        padding: 8px 14px;
        font-size: 10px;
        color: #5b6378;
        background: #0e1119;
        border-top: 1px solid #1f2533;
        text-align: center;
        font-style: italic;
    }
    .conn-state {
        display: inline-flex; align-items: center; gap: 4px;
        font-style: normal;
    }
    .conn-state .dot { width: 7px; height: 7px; border-radius: 50%; background: #c63d3d; }
    .conn-state.connected .dot { background: #23a85f; box-shadow: 0 0 5px #23a85f; }

    /* Scrollbar gọn */
    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: #2a3046; border-radius: 3px; }
    main::-webkit-scrollbar-thumb:hover { background: #3a4359; }

    /* === Cài đặt — chọn game nào hiển thị trong cửa sổ === */
    .settings-overlay {
        position: fixed; inset: 0;
        background: rgba(5, 7, 12, 0.78);
        backdrop-filter: blur(3px);
        z-index: 200;
        display: none;
        align-items: center; justify-content: center;
        padding: 16px;
    }
    .settings-overlay.show { display: flex; }
    .settings-card {
        background: #141822;
        border: 1px solid #2a3046;
        border-radius: 12px;
        width: 100%;
        max-width: 380px;
        max-height: 90vh;
        display: flex; flex-direction: column;
        box-shadow: 0 12px 36px rgba(0,0,0,0.6);
        overflow: hidden;
    }
    .settings-head {
        padding: 12px 14px;
        border-bottom: 1px solid #1f2533;
        display: flex; align-items: center; gap: 8px;
        font-size: 13px; font-weight: 700;
    }
    .settings-head .stg-close {
        margin-left: auto;
        background: transparent;
        border: 1px solid #2a3046;
        color: #c8cee0;
        padding: 4px 8px;
        border-radius: 5px;
        font-size: 11px;
        cursor: pointer;
    }
    .settings-head .stg-close:hover { background: #1f2533; }
    .settings-hint {
        padding: 8px 14px 0;
        font-size: 10px;
        color: #6b7385;
        line-height: 1.4;
    }
    .settings-body {
        flex: 1; min-height: 0;
        overflow-y: auto;
        padding: 8px 14px 12px;
        display: flex; flex-direction: column; gap: 4px;
    }
    .stg-row {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 9px;
        border-radius: 7px;
        cursor: pointer;
        transition: background .1s ease;
        user-select: none;
    }
    .stg-row:hover { background: #1c2233; }
    .stg-row input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 18px; height: 18px;
        border: 1.5px solid #4a5470;
        border-radius: 5px;
        background: #0e1119;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
        transition: background .15s ease, border-color .15s ease;
    }
    .stg-row input[type="checkbox"]:checked {
        background: #23a85f;
        border-color: #23a85f;
    }
    .stg-row input[type="checkbox"]:checked::after {
        content: '✓';
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 13px;
        font-weight: 900;
        line-height: 1;
    }
    .stg-row .stg-ico { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .stg-row .stg-name { font-size: 13px; font-weight: 600; color: #e3e7f1; flex: 1; }
    .settings-body::-webkit-scrollbar { width: 5px; }
    .settings-body::-webkit-scrollbar-thumb { background: #2a3046; border-radius: 3px; }
    </style>
</head>
<body>
    <header>
        <h1>🚀 Khởi động nhanh</h1>
        <div class="actions">
            <button id="btn-layout" class="hdr-btn" title="Đổi bố cục Dọc / Ngang">⬍</button>
            <button id="btn-settings" class="hdr-btn" title="Cài đặt — chọn game hiển thị">⚙</button>
            <button id="btn-pin" class="hdr-btn is-on" title="Luôn hiện trên cùng (Always on top)"><span class="ico">📌</span><span>Pin</span></button>
            <button id="btn-close" class="hdr-btn" title="Đóng cửa sổ">✕</button>
        </div>
    </header>

    <!-- Cài đặt: tích chọn game nào hiển thị trong cửa sổ. Một số game không có nút
         Bắt đầu (vd Hũ Thủy Tinh chỉ chạy tự động) → user có thể ẩn để gọn. -->
    <div id="settings-overlay" class="settings-overlay">
        <div class="settings-card">
            <div class="settings-head">
                <span>⚙ Cài đặt hiển thị</span>
                <button id="btn-settings-close" class="stg-close">Đóng</button>
            </div>
            <p class="settings-hint">Tích chọn game muốn hiển thị trong cửa sổ Khởi động nhanh. Game đã tắt vẫn chạy ở app chính — chỉ ẩn khỏi danh sách này.</p>
            <div id="settings-body" class="settings-body"></div>
        </div>
    </div>
    <main>
        <!-- 🔗 Kết nối TikTok — nhập ID + autocomplete từ lịch sử -->
        <div id="conn-card" class="conn-card">
            <div class="conn-head">
                <span class="conn-ico">🔗</span>
                <span>Kết nối TikTok</span>
                <span id="conn-chip" class="conn-status-chip">
                    <span class="dot"></span>
                    <span id="conn-chip-txt">Chưa kết nối</span>
                </span>
            </div>
            <div class="conn-row">
                <div class="conn-input-wrap">
                    <input id="conn-input" class="conn-input" type="text"
                           placeholder="@username TikTok…" autocomplete="off" spellcheck="false" />
                    <div id="conn-sugg" class="conn-sugg" role="listbox"></div>
                </div>
                <button id="conn-btn" class="conn-btn">Kết nối</button>
            </div>
            <p id="conn-err" class="conn-err"></p>
        </div>

        <p class="hint"><b>▶ / ⏸</b> Bắt đầu / Dừng (giữ tiến trình) · <b>↺</b> Reset (chạy lại từ đầu).</p>
        <div id="grid"></div>
    </main>
    <footer>
        <span id="conn-state" class="conn-state"><span class="dot"></span><span id="conn-text">Đang kết nối…</span></span>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    (() => {
        const gridEl    = document.getElementById('grid');
        const pinBtn    = document.getElementById('btn-pin');
        const closeBtn  = document.getElementById('btn-close');
        const connEl    = document.getElementById('conn-state');
        const connTxt   = document.getElementById('conn-text');

        // 🔗 Kết nối TikTok
        const connCard   = document.getElementById('conn-card');
        const connChip   = document.getElementById('conn-chip');
        const connChipTx = document.getElementById('conn-chip-txt');
        const connInput  = document.getElementById('conn-input');
        const connBtn    = document.getElementById('conn-btn');
        const connSugg   = document.getElementById('conn-sugg');
        const connErr    = document.getElementById('conn-err');

        // Whitelist game ổn định — phải khớp STABLE_GAMES trong app.js
        const STABLE_IDS = ['thuytinh', 'caro', 'votecomment', 'nhietdo', 'bancung', 'level-quest', 'timer', 'liveTranslate'];
        const LT_LS_KEY  = 'hp-live-translate-tool-enabled';
        const HISTORY_KEY = 'hp-tiktok-id-history';   // localStorage: lịch sử ID đã connect
        const VISIBLE_KEY = 'hp-quick-launch-visible-games';   // localStorage: array các gameId hiển thị
        // Default: hiện tất cả; user có thể tắt từng game qua ⚙ Cài đặt
        function loadVisibleGames() {
            try {
                const raw = localStorage.getItem(VISIBLE_KEY);
                if (!raw) return null;   // null = chưa cấu hình → mặc định hiện hết
                const arr = JSON.parse(raw);
                return Array.isArray(arr) ? arr : null;
            } catch (_) { return null; }
        }
        function saveVisibleGames(ids) {
            try { localStorage.setItem(VISIBLE_KEY, JSON.stringify(ids || [])); } catch (_) {}
        }
        function isGameVisible(gameId) {
            const v = loadVisibleGames();
            if (v === null) return true;   // chưa cấu hình → hiển thị mặc định
            return v.includes(gameId);
        }

        let games = [];   // [{ id, name, icon, config, virtual }]
        const running = Object.create(null);

        // TikTok connection state — sync qua socket 'status'
        let tiktokConnected = false;
        let tiktokUsername  = '';

        // Socket — listen gameConfig updates để sync khi user toggle ở app chính
        const socket = io({ reconnection: true, reconnectionDelay: 600 });
        socket.on('connect',    () => { connEl.classList.add('connected');    connTxt.textContent = 'Đã kết nối app'; });
        socket.on('disconnect', () => { connEl.classList.remove('connected'); connTxt.textContent = 'Mất kết nối — đang thử lại…'; });
        socket.on('gameConfig', ({ gameId, config }) => {
            const g = games.find(x => x.id === gameId);
            if (!g) return;
            g.config = config;
            updateCard(gameId);
        });
        // Sync trạng thái TikTok LIVE giữa app chính + cửa sổ Khởi động nhanh
        socket.on('status', (s) => {
            tiktokConnected = !!s?.connected;
            tiktokUsername  = s?.username || '';
            updateConnUi();
        });

        function setRunning(gameId, isRunning) {
            const prev = !!running[gameId];
            const next = !!isRunning;
            if (prev === next) return;
            running[gameId] = next;
            updateCard(gameId);
        }
        socket.on('votecomment:state', (s) => setRunning('votecomment', !!s?.active));
        socket.on('nhietdo:state',     (s) => setRunning('nhietdo',     !!s?.sessionActive));
        socket.on('bancung:state',     (s) => setRunning('bancung',     !!s?.sessionActive));
        socket.on('timer:state',       (s) => setRunning('timer',       !!s?.running));
        socket.on('levelquest:state',  (s) => setRunning('level-quest', !!s?.timerActive));
        socket.on('quickLaunch:status', ({ gameId, running: r }) => setRunning(gameId, r));

        const isEnabled = (g) => !g.config || !('enabled' in g.config) || g.config.enabled !== false;

        // ============================================
        // 🔗 Kết nối TikTok — lịch sử + autocomplete
        // ============================================
        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                if (!raw) return [];
                const arr = JSON.parse(raw);
                return Array.isArray(arr) ? arr.filter(x => typeof x === 'string') : [];
            } catch (_) { return []; }
        }
        function saveHistory(list) {
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 20))); } catch (_) {}
        }
        function addToHistory(id) {
            const clean = String(id || '').replace(/^@/, '').trim().toLowerCase();
            if (!clean) return;
            let list = loadHistory();
            list = list.filter(x => x.toLowerCase() !== clean);
            list.unshift(clean);
            saveHistory(list);
        }
        function removeFromHistory(id) {
            const clean = String(id || '').toLowerCase();
            const list = loadHistory().filter(x => x.toLowerCase() !== clean);
            saveHistory(list);
        }
        function renderSuggestions(query) {
            const list = loadHistory();
            const q = String(query || '').replace(/^@/, '').trim().toLowerCase();
            // Khi input rỗng → show toàn bộ lịch sử; khi có chữ → filter chứa substring
            const matches = q
                ? list.filter(x => x.toLowerCase().includes(q))
                : list;
            if (matches.length === 0) { connSugg.classList.remove('show'); connSugg.innerHTML = ''; return; }
            connSugg.innerHTML = matches.map(id => {
                const safe = escapeHtml(id);
                const highlighted = q
                    ? safe.replace(new RegExp('(' + escapeRegex(q) + ')', 'gi'), '<b>$1</b>')
                    : safe;
                return `
                    <div class="conn-sugg-item" data-id="${safe}">
                        <span class="sugg-name">@${highlighted}</span>
                        <button class="sugg-del" data-act="del" data-id="${safe}" title="Xóa khỏi lịch sử">×</button>
                    </div>`;
            }).join('');
            connSugg.classList.add('show');
        }
        function hideSuggestions() { connSugg.classList.remove('show'); }

        connInput.addEventListener('focus', () => {
            if (!tiktokConnected) renderSuggestions(connInput.value);
        });
        connInput.addEventListener('input', () => {
            renderSuggestions(connInput.value);
            showConnErr('');
        });
        connInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); doConnectClick(); }
            else if (e.key === 'Escape') { hideSuggestions(); }
        });
        // Click ngoài → ẩn dropdown
        document.addEventListener('click', (e) => {
            if (!connCard.contains(e.target)) hideSuggestions();
        });
        // Click vào suggestion: chọn ID hoặc xóa khỏi history
        connSugg.addEventListener('click', (e) => {
            const delBtn = e.target.closest('[data-act="del"]');
            if (delBtn) {
                e.stopPropagation();
                removeFromHistory(delBtn.dataset.id || '');
                renderSuggestions(connInput.value);
                return;
            }
            const item = e.target.closest('.conn-sugg-item');
            if (item) {
                connInput.value = item.dataset.id || '';
                hideSuggestions();
                connInput.focus();
            }
        });

        function showConnErr(msg) {
            connErr.textContent = msg || '';
            connErr.classList.toggle('show', !!msg);
        }
        function updateConnUi() {
            connCard.classList.toggle('is-live', tiktokConnected);
            connChip.classList.toggle('is-live', tiktokConnected);
            if (tiktokConnected) {
                connChipTx.textContent = 'Đã kết nối @' + tiktokUsername;
                connInput.value = tiktokUsername;
                connInput.disabled = true;
                connBtn.textContent = 'Ngắt';
                connBtn.classList.add('is-disc');
                connBtn.disabled = false;
                hideSuggestions();
                showConnErr('');
            } else {
                connChipTx.textContent = 'Chưa kết nối';
                connInput.disabled = false;
                connBtn.textContent = 'Kết nối';
                connBtn.classList.remove('is-disc');
                connBtn.disabled = false;
            }
        }
        async function fetchLastUsername() {
            // Auto-fill ID đã connect trước đó (server lưu trong app-config.json)
            try {
                const r = await fetch('/api/last-user');
                const d = await r.json();
                if (d?.username && !connInput.value) {
                    connInput.value = d.username;
                    addToHistory(d.username);   // gộp vào lịch sử nếu chưa có
                }
            } catch (_) {}
        }
        async function doConnectClick() {
            if (tiktokConnected) { await doDisconnect(); return; }
            await doConnect();
        }
        async function doConnect() {
            const username = (connInput.value || '').trim().replace(/^@/, '');
            if (!username) { connInput.focus(); showConnErr('Vui lòng nhập TikTok ID'); return; }
            connBtn.disabled = true;
            connBtn.textContent = '⏳ Đang kết nối…';
            showConnErr('');
            hideSuggestions();
            try {
                const res = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                if (res.status === 403 && data._creatorLocked) {
                    showConnErr(data.error || 'Username không khớp với key CREATOR');
                    if (data.boundTiktokId) connInput.value = data.boundTiktokId;
                    return;
                }
                if (!data.ok) throw new Error(data.error || 'Lỗi không xác định');
                addToHistory(data.username || username);
                // status event từ server sẽ tự cập nhật UI (tiktokConnected=true)
            } catch (e) {
                showConnErr('Lỗi: ' + (e.message || e));
            } finally {
                if (!tiktokConnected) {
                    connBtn.disabled = false;
                    connBtn.textContent = 'Kết nối';
                }
            }
        }
        async function doDisconnect() {
            if (!confirm('Ngắt kết nối khỏi @' + tiktokUsername + '?\nOBS overlay sẽ ngừng nhận sự kiện.')) return;
            connBtn.disabled = true;
            connBtn.textContent = '⏳…';
            try { await fetch('/api/disconnect', { method: 'POST' }); }
            catch (e) { showConnErr('Lỗi: ' + e.message); }
        }
        connBtn.addEventListener('click', doConnectClick);

        // ============================================
        // Game cards
        // ============================================
        async function loadGames() {
            try {
                const r = await fetch('/api/games');
                const list = await r.json();
                games = list.filter(g => STABLE_IDS.includes(g.id));
                games.push({
                    id: 'liveTranslate',
                    name: 'Dịch Thuật LIVE',
                    icon: '🌐',
                    virtual: true,
                    config: { enabled: localStorage.getItem(LT_LS_KEY) !== 'false' }
                });
                games.sort((a, b) => STABLE_IDS.indexOf(a.id) - STABLE_IDS.indexOf(b.id));
                render();
            } catch (e) {
                connTxt.textContent = 'Không tải được danh sách game';
            }
        }

        function render() {
            gridEl.innerHTML = '';
            for (const g of games) {
                if (!isGameVisible(g.id)) continue;   // user đã tích tắt ở ⚙ Cài đặt
                gridEl.appendChild(buildCard(g));
            }
        }

        function stateOf(g) {
            const enabled = isEnabled(g);
            if (running[g.id]) return { cls: 'live', label: 'Đang chạy' };
            if (enabled)       return { cls: 'on',   label: 'Sẵn sàng' };
            return                       { cls: 'off',  label: 'Đã TẮT ở Thư viện' };
        }
        function buildCard(g) {
            const st = stateOf(g);
            const card = document.createElement('div');
            card.className = 'ql-card is-' + st.cls;
            card.dataset.gameId = g.id;
            const isRun = !!running[g.id];
            const toggleAct = isRun ? 'stop' : 'start';
            const toggleCls = isRun ? 'is-pause' : 'is-play';
            const toggleIco = isRun ? '⏸' : '▶';
            const toggleTip = isRun ? 'Dừng / tạm dừng phiên (giữ tiến trình)' : 'Bắt đầu / tiếp tục phiên';
            card.innerHTML = `
                <div class="ql-card-head">
                    <span class="ql-card-ico">${g.icon}</span>
                    <div class="ql-card-meta">
                        <div class="ql-card-name">${escapeHtml(g.name)}</div>
                        <span class="ql-card-state ${st.cls}">
                            <span class="dot"></span>
                            <span class="state-txt">${st.label}</span>
                        </span>
                    </div>
                </div>
                <div class="ql-card-actions">
                    <button class="ql-btn ql-btn-toggle ${toggleCls}" data-act="${toggleAct}" title="${toggleTip}">${toggleIco}</button>
                    <button class="ql-btn ql-btn-reset" data-act="reset" title="Reset — chạy lại từ đầu, xóa tiến trình">↺</button>
                </div>
            `;
            card.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-act]');
                if (!btn) return;
                fireAction(g, btn.dataset.act);
            });
            return card;
        }

        function updateCard(gameId) {
            const card = gridEl.querySelector(`.ql-card[data-game-id="${gameId}"]`);
            const g = games.find(x => x.id === gameId);
            if (!card || !g) return;
            const st = stateOf(g);
            card.classList.remove('is-live', 'is-on', 'is-off');
            card.classList.add('is-' + st.cls);
            const state = card.querySelector('.ql-card-state');
            const stateTxt = card.querySelector('.state-txt');
            if (state) state.className = 'ql-card-state ' + st.cls;
            if (stateTxt) stateTxt.textContent = st.label;
            // Cập nhật toggle button theo trạng thái running
            const tBtn = card.querySelector('.ql-btn-toggle');
            if (tBtn) {
                const isRun = !!running[gameId];
                tBtn.classList.toggle('is-pause', isRun);
                tBtn.classList.toggle('is-play', !isRun);
                tBtn.dataset.act = isRun ? 'stop' : 'start';
                tBtn.textContent = isRun ? '⏸' : '▶';
                tBtn.title = isRun ? 'Dừng / tạm dừng phiên (giữ tiến trình)' : 'Bắt đầu / tiếp tục phiên';
            }
        }

        function fireAction(g, action) {
            const card = gridEl.querySelector(`.ql-card[data-game-id="${g.id}"]`);
            const isReset = action === 'reset';
            const btn = card?.querySelector(isReset ? '.ql-btn-reset' : '.ql-btn-toggle');
            if (btn) {
                btn.textContent = '⏳';
                btn.disabled = true;
                // ⚠ KHÔNG khôi phục lại text cũ — phải vẽ lại theo trạng thái running THẬT.
                // Trước đây restore `orig` ('⏸') ghi đè icon ▶ mà server vừa cập nhật → icon kẹt ⏸.
                setTimeout(() => {
                    btn.disabled = false;
                    if (isReset) btn.textContent = '↺';   // nút reset cố định icon ↺
                    else updateCard(g.id);                 // nút toggle: re-render ▶/⏸ theo running[g.id]
                }, 700);
            }
            socket.emit('quickLaunch:cmd', { gameId: g.id, action });
        }

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }
        function escapeRegex(s) {
            return String(s || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Header buttons — bridge tới Electron qua IPC nếu có
        const ipc = (typeof window !== 'undefined' && window.hpQuickLaunch) ? window.hpQuickLaunch : null;
        function applyPinUi(on) {
            pinBtn.classList.toggle('is-on', !!on);
            pinBtn.title = on ? 'Luôn hiện trên cùng — bấm để tắt pin' : 'Bấm để pin trên cùng';
        }
        ipc?.onInitPin?.(applyPinUi);
        pinBtn.addEventListener('click', () => {
            const next = !pinBtn.classList.contains('is-on');
            applyPinUi(next);
            if (ipc?.setAlwaysOnTop) ipc.setAlwaysOnTop(next);
        });
        closeBtn.addEventListener('click', () => {
            if (ipc?.close) ipc.close();
            else window.close();
        });

        // ===== Bố cục Dọc / Ngang =====
        const layoutBtn = document.getElementById('btn-layout');
        const LAYOUT_KEY = 'hp-ql-layout';
        function applyLayout(mode) {
            const ngang = mode === 'ngang';
            document.body.classList.toggle('layout-ngang', ngang);
            if (layoutBtn) {
                layoutBtn.textContent = ngang ? '⬌' : '⬍';
                layoutBtn.title = ngang ? 'Đang NGANG — bấm để chuyển Dọc' : 'Đang DỌC — bấm để chuyển Ngang';
                layoutBtn.classList.toggle('is-on', ngang);
            }
            // Resize cửa sổ ÔM SÁT nội dung: đặt bề rộng trước → đo chiều cao thật của card → set lại.
            // Tự nhỏ nhất khi nội dung 1 dòng, tự to khi card cao hơn (2-3 dòng).
            const w = ngang ? 760 : 340;
            const setSize = (ww, hh) => {
                try { if (ipc?.setSize) ipc.setSize(ww, hh); else window.resizeTo(ww, hh); } catch (_) {}
            };
            setSize(w, ngang ? 240 : 600);   // bước 1: đặt bề rộng trước để layout reflow/wrap đúng
            // bước 2: chờ cửa sổ đổi bề rộng & reflow xong → đo ĐÁY thấp nhất của card thật → fit chiều cao
            clearTimeout(window.__qlFitTimer);
            window.__qlFitTimer = setTimeout(() => {
                try {
                    const main = document.querySelector('main');
                    const footer = document.querySelector('footer');
                    if (!main || !footer) return;
                    let bottom = 0;
                    main.querySelectorAll('#conn-card, .ql-card').forEach(el => {
                        const r = el.getBoundingClientRect();
                        if (r.height > 0) bottom = Math.max(bottom, r.bottom);
                    });
                    if (!bottom) return;
                    const padB = parseFloat(getComputedStyle(main).paddingBottom || 0) || 0;
                    let h = Math.round(bottom + padB + footer.offsetHeight + 6);
                    h = Math.max(150, Math.min(h, 940));   // ôm sát; cap để không tràn màn hình (dọc nhiều game → cuộn)
                    setSize(w, h);
                } catch (_) {}
            }, 90);
        }
        let curLayout = localStorage.getItem(LAYOUT_KEY) === 'ngang' ? 'ngang' : 'doc';
        applyLayout(curLayout);   // áp tạm theo localStorage để không nháy
        // Nguồn CHUẨN: chế độ lưu trong prefs Electron (bền qua các lần mở, đồng bộ với vị trí cửa sổ)
        ipc?.onInitLayout?.((mode) => {
            curLayout = mode === 'ngang' ? 'ngang' : 'doc';
            localStorage.setItem(LAYOUT_KEY, curLayout);
            applyLayout(curLayout);
        });
        layoutBtn?.addEventListener('click', () => {
            curLayout = curLayout === 'ngang' ? 'doc' : 'ngang';
            localStorage.setItem(LAYOUT_KEY, curLayout);
            ipc?.setLayout?.(curLayout);   // lưu bền vào prefs → mở lại giữ đúng chế độ
            applyLayout(curLayout);
        });

        // Khi user KÉO TAY đổi bề rộng → card tự wrap (CSS) → tự đo lại & ôm sát chiều cao (không thừa/đè).
        // Guard ±8px chống loop (setSize → resize → setSize...).
        let _qlResizeFit;
        window.addEventListener('resize', () => {
            clearTimeout(_qlResizeFit);
            _qlResizeFit = setTimeout(() => {
                try {
                    const main = document.querySelector('main');
                    const footer = document.querySelector('footer');
                    if (!main || !footer) return;
                    let bottom = 0;
                    main.querySelectorAll('#conn-card, .ql-card').forEach(el => {
                        const r = el.getBoundingClientRect();
                        if (r.height > 0) bottom = Math.max(bottom, r.bottom);
                    });
                    if (!bottom) return;
                    const padB = parseFloat(getComputedStyle(main).paddingBottom || 0) || 0;
                    let h = Math.max(150, Math.min(Math.round(bottom + padB + footer.offsetHeight + 6), 940));
                    if (Math.abs(h - window.innerHeight) > 8) {
                        const ww = Math.round(window.outerWidth || window.innerWidth);
                        if (ipc?.setSize) ipc.setSize(ww, h); else window.resizeTo(ww, h);
                    }
                } catch (_) {}
            }, 160);
        });

        // ============================================
        // ⚙ Cài đặt hiển thị — tích chọn game hiển thị
        // ============================================
        const settingsBtn = document.getElementById('btn-settings');
        const settingsOverlay = document.getElementById('settings-overlay');
        const settingsBody = document.getElementById('settings-body');
        const settingsClose = document.getElementById('btn-settings-close');
        function renderSettingsBody() {
            settingsBody.innerHTML = '';
            // Chỉ hiện game đã load (đã filter STABLE_IDS) — không hardcode danh sách
            // để tránh out-of-sync khi thêm/xóa game ở STABLE_IDS.
            for (const g of games) {
                const row = document.createElement('label');
                row.className = 'stg-row';
                row.innerHTML = `
                    <input type="checkbox" data-game-id="${g.id}" ${isGameVisible(g.id) ? 'checked' : ''} />
                    <span class="stg-ico">${g.icon}</span>
                    <span class="stg-name">${escapeHtml(g.name)}</span>
                `;
                settingsBody.appendChild(row);
            }
        }
        function openSettings() {
            renderSettingsBody();
            settingsOverlay.classList.add('show');
        }
        function closeSettings() { settingsOverlay.classList.remove('show'); }
        settingsBtn.addEventListener('click', openSettings);
        settingsClose.addEventListener('click', closeSettings);
        // Click ngoài card → đóng
        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) closeSettings();
        });
        // Tích/bỏ tích — cập nhật ngay localStorage + re-render grid
        settingsBody.addEventListener('change', (e) => {
            const cb = e.target.closest('input[type="checkbox"][data-game-id]');
            if (!cb) return;
            const cur = loadVisibleGames();
            // Khởi tạo từ trạng thái hiện tại nếu chưa có config
            let next = cur === null ? games.map(g => g.id) : cur.slice();
            const gid = cb.dataset.gameId;
            if (cb.checked) {
                if (!next.includes(gid)) next.push(gid);
            } else {
                next = next.filter(x => x !== gid);
            }
            saveVisibleGames(next);
            render();   // re-render grid sau mỗi lần tích — phản hồi tức thì
        });

        loadGames();
        fetchLastUsername();
        updateConnUi();
    })();
    </script>
</body>
</html>
