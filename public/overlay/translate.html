<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live Translate — OBS Overlay</title>
<style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
    body { font-family: "Segoe UI", Tahoma, Arial, sans-serif; color: #fff; -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision; }
    #wrap {
        position: fixed;
        left: 32px;
        right: 32px;
        bottom: 42px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
    }
    .msg {
        max-width: 920px;
        display: grid;
        grid-template-columns: 54px 1fr;
        gap: 12px;
        align-items: start;
        padding: 12px 16px 14px 12px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(10, 14, 24, 0.88), rgba(29, 20, 46, 0.82));
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 16px 40px rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
        animation: in .22s ease-out;
    }
    .msg.leaving { animation: out .22s ease-in forwards; }
    .avatar {
        width: 54px; height: 54px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff2d55, #25f4ee);
        overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900;
        box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .name {
        color: #ffd166;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.1;
        text-shadow: 0 2px 6px rgba(0,0,0,0.72);
    }
    .route {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 5px;
        color: #9be7ff;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        text-shadow: 0 2px 8px rgba(0,0,0,0.75);
    }
    .route .arrow { color: #fff; opacity: 0.85; }
    .translated {
        margin-top: 5px;
        font-size: 29px;
        line-height: 1.16;
        font-weight: 700;
        letter-spacing: 0.1px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.86);
        overflow-wrap: anywhere;
    }
    .original {
        margin-top: 7px;
        color: rgba(255,255,255,0.74);
        font-size: 16px;
        line-height: 1.25;
        font-weight: 500;
        overflow-wrap: anywhere;
    }
    .error .translated::after {
        content: " · dịch tạm thời lỗi";
        color: #fca5a5;
        font-size: 16px;
        font-weight: 700;
    }
    @keyframes in {
        from { opacity: 0; transform: translateY(18px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes out {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-16px); }
    }
</style>
</head>
<body>
    <div id="wrap"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
    (function () {
        const wrap = document.getElementById('wrap');
        const socket = io({ reconnection: true, reconnectionDelay: 600, reconnectionDelayMax: 5000 });
        let config = { enabled: true, ttsEnabled: true, ttsVoice: 'auto', ttsPreset: 'auto', ttsReadMode: 'nameAndComment', ttsVolume: 85, ttsRate: 1, readUsername: true, maxItems: 8, sourceLang: 'auto', targetLang: 'vi', ttsSource: 'browser' };
        let voices = [];
        let voicesReadyResolved = false;
        let voicesReadyPromise = null;
        let randomGenderNext = Math.random() < 0.5 ? 'male' : 'female';

        // Hàng đợi đọc tuần tự — tránh nhiều giọng đè lên nhau khi flood comment.
        // pendingQueue chỉ giữ tối đa MAX_PENDING item; vượt thì drop oldest để không tích đọc câu cũ.
        const MAX_PENDING = 5;
        const pendingQueue = [];
        let speaking = false;

        function loadVoices() {
            if (!('speechSynthesis' in window)) return;
            const v = window.speechSynthesis.getVoices() || [];
            if (v.length) {
                voices = v;
                if (!voicesReadyResolved) voicesReadyResolved = true;
            }
        }
        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        function ensureVoicesReady() {
            if (voicesReadyResolved || !('speechSynthesis' in window)) return Promise.resolve();
            if (voicesReadyPromise) return voicesReadyPromise;
            voicesReadyPromise = new Promise(resolve => {
                let elapsed = 0;
                const tick = setInterval(() => {
                    loadVoices();
                    elapsed += 150;
                    if (voicesReadyResolved || elapsed >= 1500) {
                        clearInterval(tick);
                        resolve();
                    }
                }, 150);
            });
            return voicesReadyPromise;
        }

        function initials(name) {
            return String(name || '?').trim().slice(0, 1).toUpperCase() || '?';
        }

        function langForSpeech(lang) {
            const map = { vi: 'vi-VN', en: 'en-US', th: 'th-TH', id: 'id-ID', ja: 'ja-JP', ko: 'ko-KR', zh: 'zh-CN', fr: 'fr-FR', de: 'de-DE', es: 'es-ES' };
            return map[lang] || lang || 'vi-VN';
        }

        const FEMALE_HINTS = /female|woman|girl|zira|hazel|susan|heera|samantha|victoria|mai|linh|hoai|hanh|google uk english female/i;
        const MALE_HINTS = /male|man|boy|david|mark|george|daniel|james|nam|minh|an|google uk english male/i;

        function pickVoice(lang, gender) {
            if (!voices.length) loadVoices();
            const speechLang = langForSpeech(lang).toLowerCase();
            const sameLang = voices.filter(v => String(v.lang || '').toLowerCase().startsWith(speechLang.slice(0, 2)));
            if (!sameLang.length) return null;
            const pool = sameLang;
            if (gender === 'random') return pool[Math.floor(Math.random() * pool.length)] || null;
            if (gender === 'randomGender') {
                const next = randomGenderNext;
                randomGenderNext = randomGenderNext === 'male' ? 'female' : 'male';
                return pickVoice(lang, next) || pool[Math.floor(Math.random() * pool.length)] || null;
            }
            const females = pool.filter(v => FEMALE_HINTS.test(v.name));
            const males = pool.filter(v => MALE_HINTS.test(v.name));
            if (gender === 'female') return females[0] || pool[0] || null;
            if (gender === 'male') return males[0] || pool.find(v => !FEMALE_HINTS.test(v.name)) || pool[0] || null;
            const m = String(gender || '').match(/^variant(\d)$/);
            if (m) {
                // Xen kẽ nữ → nam → còn lại để variant1..variant5 ra giọng khác nhau khi pool đủ.
                const rest = pool.filter(v => !females.includes(v) && !males.includes(v));
                const ordered = [...females, ...males, ...rest];
                const base = ordered.length ? ordered : pool;
                return base[(parseInt(m[1], 10) - 1) % base.length] || null;
            }
            return pool.find(v => v.default) || pool[0] || null;
        }

        function hasLocalVoice(lang) {
            if (!voices.length) loadVoices();
            const speechLang = langForSpeech(lang).toLowerCase();
            return voices.some(v => String(v.lang || '').toLowerCase().startsWith(speechLang.slice(0, 2)));
        }

        function cleanSpokenName(name) {
            return String(name || '')
                .replace(/^[^\p{L}\p{N}]+/u, '')
                .replace(/[^\p{L}\p{N}\s._-]+/gu, ' ')
                .replace(/\s{2,}/g, ' ')
                .trim()
                .slice(0, 40);
        }

        function presetLang(item) {
            const preset = item?.ttsPreset || config.ttsPreset || 'auto';
            return ['vi', 'en', 'zh', 'ko', 'ja'].includes(preset) ? preset : (item?.targetLang || config.targetLang || 'vi');
        }

        function enqueueSpeak(text, item) {
            const ttsOn = item?.ttsEnabled == null ? config.ttsEnabled : item.ttsEnabled;
            if (!ttsOn || item?.canSpeak === false) return;
            const mode = item?.ttsReadMode || config.ttsReadMode || (config.readUsername ? 'nameAndComment' : 'commentOnly');
            const commentText = String(text || '').trim();
            const userName = cleanSpokenName(item?.nickname || item?.uniqueId || '');
            let value = commentText;
            if (mode === 'nameOnly') value = userName;
            else if (mode === 'nameAndComment' && userName) value = `${userName}. ${commentText}`;
            if (!value) return;
            pendingQueue.push({ value, item });
            while (pendingQueue.length > MAX_PENDING) pendingQueue.shift();
            pumpQueue();
        }

        async function pumpQueue() {
            if (speaking) return;
            speaking = true;
            try {
                await ensureVoicesReady();
                while (pendingQueue.length) {
                    const next = pendingQueue.shift();
                    try { await speakOne(next.value, next.item); }
                    catch (_) { /* tiếp tục item kế */ }
                }
            } finally {
                speaking = false;
            }
        }

        function speakOne(value, item) {
            return new Promise(resolve => {
                const volume = Math.max(0, Math.min(1, (parseInt(item?.ttsVolume == null ? config.ttsVolume : item.ttsVolume, 10) || 85) / 100));
                const rate = Math.max(0.5, Math.min(2, parseFloat(item?.ttsRate || config.ttsRate || 1) || 1));
                const speechLang = presetLang(item);
                // ★ TTS source — user chọn 1 trong 2 để tránh phát 2 tiếng đè nhau
                const source = (item?.ttsSource || config.ttsSource || 'browser');

                let finished = false;
                let fallbackFired = false;     // ⛔ chống fallback fire 2 lần (race: error event + play().catch)
                const done = () => { if (finished) return; finished = true; resolve(); };

                // ===== Path 1: BROWSER TTS (mặc định) =====
                if (source === 'browser') {
                    if ('speechSynthesis' in window && hasLocalVoice(speechLang)) {
                        speakWithBrowser(value, volume, rate, item, speechLang, done);
                    } else {
                        // Không có browser voice → skip (KHÔNG fallback remote để tránh phát 2 tiếng)
                        console.log('[translate-tts] SKIP: source=browser nhưng không có voice cho', speechLang);
                        done();
                    }
                    return;
                }

                // ===== Path 2: REMOTE TTS (Google translate_tts) =====
                // Single path: chỉ remote, KHÔNG fallback sang browser (tránh phát 2 tiếng)
                const audio = new Audio('/api/live-translate/tts?lang=' + encodeURIComponent(speechLang || 'vi') + '&text=' + encodeURIComponent(value.slice(0, 220)));
                audio.volume = volume;
                audio.playbackRate = rate;
                audio.addEventListener('ended', done, { once: true });
                audio.addEventListener('error', () => {
                    if (fallbackFired || finished) return;
                    fallbackFired = true;
                    console.log('[translate-tts] remote audio error → done (no fallback to avoid double-speak)');
                    done();
                }, { once: true });
                setTimeout(done, 12000);
                audio.play().catch(() => {
                    if (fallbackFired || finished) return;
                    fallbackFired = true;
                    console.log('[translate-tts] remote audio play rejected → done');
                    done();
                });
            });
        }

        function speakWithBrowser(value, volume, rate, item, speechLang, onDone) {
            const finish = typeof onDone === 'function' ? onDone : () => {};
            if (!('speechSynthesis' in window)) return finish();
            try { window.speechSynthesis.cancel(); } catch (_) {}
            const utter = new SpeechSynthesisUtterance(value.slice(0, 220));
            const lang = speechLang || presetLang(item);
            utter.lang = langForSpeech(lang);
            const voice = pickVoice(lang, item?.ttsVoice || config.ttsVoice || 'auto');
            if (voice) utter.voice = voice;
            utter.rate = Math.max(0.5, Math.min(2, parseFloat(rate || config.ttsRate || 1) || 1));
            utter.pitch = 1;
            utter.volume = volume;
            let finished = false;
            const done = () => { if (finished) return; finished = true; finish(); };
            utter.onend = done;
            utter.onerror = done;
            // Safety timeout: Web Speech API thỉnh thoảng nuốt event onend.
            setTimeout(done, Math.max(6000, value.length * 140));
            window.speechSynthesis.speak(utter);
        }

        function trimItems() {
            const max = Math.max(3, Math.min(20, config.maxItems || 8));
            while (wrap.children.length > max) {
                wrap.removeChild(wrap.firstElementChild);
            }
        }

        function addComment(item) {
            const el = document.createElement('div');
            el.className = 'msg' + (item.error ? ' error' : '');
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            if (item.profilePicture) {
                const img = document.createElement('img');
                img.src = item.profilePicture;
                img.onerror = () => { avatar.textContent = initials(item.nickname || item.uniqueId); };
                avatar.appendChild(img);
            } else {
                avatar.textContent = initials(item.nickname || item.uniqueId);
            }
            const body = document.createElement('div');
            const name = document.createElement('div');
            name.className = 'name';
            name.textContent = item.nickname || item.uniqueId || 'guest';
            const route = document.createElement('div');
            route.className = 'route';
            route.innerHTML = `<span>${item.sourceLangLabel || 'Tự nhận diện'}</span><span class="arrow">→</span><span>${item.targetLangLabel || 'Tiếng Việt'}</span>`;
            const translated = document.createElement('div');
            translated.className = 'translated';
            translated.textContent = item.translatedText || item.originalText || '';
            if (item.toxic) translated.title = 'AI filter: không đọc bình luận này';
            const original = document.createElement('div');
            original.className = 'original';
            original.textContent = item.originalText || '';
            body.appendChild(name);
            body.appendChild(route);
            body.appendChild(translated);
            if ((item.originalText || '') && item.originalText !== item.translatedText) body.appendChild(original);
            el.appendChild(avatar);
            el.appendChild(body);
            wrap.appendChild(el);
            trimItems();
            enqueueSpeak(item.translatedText || item.normalizedText || item.originalText, item);
            setTimeout(() => {
                el.classList.add('leaving');
                setTimeout(() => el.remove(), 260);
            }, 16000);
        }

        socket.on('connect', () => socket.emit('subscribe', 'translateOverlay'));
        socket.on('translate:config', cfg => { config = { ...config, ...(cfg || {}) }; });
        socket.on('translate:comment', addComment);
        socket.on('translate:testSpeak', item => enqueueSpeak(item?.translatedText || 'HP Media xin chào, đây là giọng đọc thử bằng tiếng Việt.', item || {}));
    })();
    </script>
</body>
</html>
