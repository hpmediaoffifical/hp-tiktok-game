<!doctype html>
<html lang="vi">
<head>
    <script src="/lib/overlay-resolution.js"></script>
<meta charset="utf-8" />
<title>HP Caro LIVE — OBS Overlay</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<style>
    html, body {
        margin: 0; padding: 0; height: 100%; width: 100%; background: transparent; overflow: hidden;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        /* HTML text (popout chip) — rasterize chuẩn hình học, không bị pixel-snap mờ */
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    #stage { position: fixed; inset: 0; background: transparent; overflow: hidden; }
    #content {
        position: absolute;
        top: var(--y, 50%); left: var(--x, 50%);
        transform: translate(-50%, -50%) scale(var(--scale, 1));
        transform-origin: center center;
        width: 1080px; height: 1920px;
        background: transparent;
        transition: top 0.25s ease, left 0.25s ease, transform 0.25s ease;
        /* GPU layer promotion → bilinear filter chất lượng cao khi OBS scale khác
           1080×1920 → không pixel-snap, không răng cưa, hỗ trợ HD canvas bên trong. */
        will-change: transform;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
    }
    #content canvas {
        position: absolute; inset: 0; width: 100%; height: 100%;
        /* Khi browser downsample canvas 3240×5760 → 1080×1920 → dùng filter chất lượng cao */
        image-rendering: -webkit-optimize-contrast;
        image-rendering: high-quality;
    }
    .debug-pill {
        position: fixed; bottom: 8px; left: 8px;
        background: rgba(0,0,0,0.5);
        color: #fff; font: 11px/1.2 monospace;
        padding: 4px 8px; border-radius: 6px;
        z-index: 9999; opacity: 0.5;
    }
    .debug-pill.hidden { display: none; }

    /* === Offline state (cùng pattern Hủ): khi app đóng → ẩn toàn bộ */
    body.offline #content { display: none; }
    body.offline #stage { background: transparent; }
    body.offline .debug-pill { display: none !important; }

    /* === POPOUT mode — cửa sổ Overlay Review trong suốt (Electron BrowserWindow
       transparent:true, frame:false). OBS Window Capture (WGC) bắt cửa sổ này
       sắc nét hơn Browser Source vì render 1:1 native DPI. Body GIỮ transparent
       để OBS WGC giữ alpha channel. Control strip auto-hide → khi user không
       hover (OBS đang capture passively) → invisible → OBS không bắt vào. */
    #popout-controls { display: none; }
    body.popout-mode #popout-controls {
        display: flex;
        position: fixed; top: 0; left: 50%; transform: translateX(-50%);
        z-index: 99999;
        gap: 6px; align-items: center;
        padding: 5px 12px;
        background: rgba(10, 12, 18, 0.7);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-top: none;
        border-radius: 0 0 10px 10px;
        color: #e6e8ee;
        font: 600 11px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-app-region: drag;
        opacity: 0;
        transition: opacity 0.22s ease;
        user-select: none;
    }
    /* Hover hoặc focus-within → hiện. Khi OBS chỉ "xem" cửa sổ (không di chuột
       qua nó) → opacity 0 → OBS render thấy strip biến mất. */
    body.popout-mode:hover #popout-controls,
    body.popout-mode #popout-controls:focus-within { opacity: 1; }
    body.popout-mode #popout-controls .pc-hint { opacity: 0.7; padding-right: 4px; }
    body.popout-mode #popout-controls button {
        -webkit-app-region: no-drag;
        background: rgba(255, 255, 255, 0.08);
        color: #e6e8ee;
        border: 1px solid rgba(255, 255, 255, 0.18);
        padding: 3px 9px;
        cursor: pointer;
        border-radius: 6px;
        font: inherit;
    }
    body.popout-mode #popout-controls button:hover {
        background: rgba(255, 255, 255, 0.18);
        border-color: rgba(255, 255, 255, 0.32);
    }
    body.popout-mode #popout-controls button.pin-on {
        background: rgba(255, 107, 61, 0.35);
        border-color: rgba(255, 107, 61, 0.65);
    }
    /* Trong popout: ẩn debug pill — không muốn OBS bắt phải */
    body.popout-mode .debug-pill { display: none !important; }
</style>
</head>
<body>
    <div id="stage">
        <div id="content">
            <canvas id="caro-canvas" width="1080" height="1920"></canvas>
        </div>
    </div>
    <div class="debug-pill" id="debug">connecting…</div>

    <!-- POPOUT control strip — chỉ hiện khi ?popout=1 + đang hover. Cho phép
         kéo cửa sổ trong suốt (frameless không có titlebar) + pin + close. -->
    <div id="popout-controls">
        <span class="pc-hint">🎯 Caro · Overlay Review</span>
        <button id="pc-pin"  type="button" title="Ghim trên cùng">📌 Pin</button>
        <button id="pc-close" type="button" title="Đóng cửa sổ">✕</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/games/caro/game.js"></script>
    <script>
    (function () {
        // === POPOUT mode init — phải trước everything để debug pill / scale logic
        // pick đúng class. ?popout=1 = Electron transparent frameless window. ===
        const isPopout = new URLSearchParams(location.search).has('popout');
        if (isPopout) {
            document.body.classList.add('popout-mode');
            const pinBtn = document.getElementById('pc-pin');
            const closeBtn = document.getElementById('pc-close');
            // Preload (caro-preview-preload.js) expose window.hpCaroPreview qua
            // contextBridge — chỉ available trong Electron popout, KHÔNG có trong
            // OBS Browser Source (vẫn render overlay đầy đủ vì controls đã CSS-ẩn
            // ngoài popout-mode).
            const api = window.hpCaroPreview || null;
            let pinned = false;
            pinBtn?.addEventListener('click', () => {
                pinned = !pinned;
                pinBtn.classList.toggle('pin-on', pinned);
                pinBtn.textContent = pinned ? '📌 Pinned' : '📌 Pin';
                api?.setAlwaysOnTop(pinned);
            });
            closeBtn?.addEventListener('click', () => {
                if (api?.close) api.close();
                else { try { window.close(); } catch (e) {} }
            });
        }

        const debugEl = document.getElementById('debug');
        const content = document.getElementById('content');
        const canvas = document.getElementById('caro-canvas');

        // === QUAN TRỌNG: declare state vars TRƯỚC khi gọi fitScale() ===
        // Trước đây bug TDZ — fitScale() đọc currentCfg trước khi let declared
        // → ReferenceError → script crash → page blank trong OBS
        let game = null;
        let currentCfg = null;

        // ===== Web Audio synth (overlay phát cùng âm với panel) =====
        const SoundManager = {
            ctx: null,
            ensureCtx() {
                if (this.ctx) return this.ctx;
                try {
                    const C = window.AudioContext || window.webkitAudioContext;
                    if (C) this.ctx = new C();
                } catch (e) {}
                return this.ctx;
            },
            play(kind, side) {
                if (!currentCfg?.audio?.enabled) return;
                const ctx = this.ensureCtx(); if (!ctx) return;
                if (ctx.state === 'suspended') ctx.resume();
                const vol = Math.max(0, Math.min(1, (currentCfg.audio.volume ?? 50) / 100));
                if (vol === 0) return;
                const now = ctx.currentTime;
                if (kind === 'place') {
                    const osc = ctx.createOscillator(), gain = ctx.createGain();
                    if (side === 'idol') { osc.frequency.value = 880; osc.type = 'sine'; }
                    else { osc.frequency.value = 440; osc.type = 'triangle'; }
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.25 * vol, now + 0.005);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(now); osc.stop(now + 0.18);
                }
            }
        };

        function applyDisplayCfg() {
            if (!currentCfg || !currentCfg.display) return;
            // Recompute scale = base-fit × user-scale
            const w = window.innerWidth, h = window.innerHeight;
            const base = Math.min(w / 1080, h / 1920);
            const userScale = (currentCfg.display.scale || 100) / 100;
            content.style.setProperty('--scale', String(base * userScale));
            // Position
            content.style.setProperty('--x', (currentCfg.display.xPercent ?? 50) + '%');
            content.style.setProperty('--y', (currentCfg.display.yPercent ?? 50) + '%');
        }

        function fitScale() {
            if (currentCfg && currentCfg.display) {
                applyDisplayCfg();
            } else {
                const w = window.innerWidth, h = window.innerHeight;
                const s = Math.min(w / 1080, h / 1920);
                content.style.setProperty('--scale', String(s));
            }
        }
        window.addEventListener('resize', fitScale);
        fitScale();
        setTimeout(() => debugEl.classList.add('hidden'), 4000);

        function ensureGame(cfg) {
            if (game) return;
            currentCfg = cfg;
            game = HpGame.caro.create({
                canvas,
                mirrorMode: true,
                config: cfg || HpGame.caro.defaultConfig()
            });
            // Overlay: play sound khi engine fire 'sound' (qua loadState detect)
            game.on('sound', (ev) => SoundManager.play(ev.kind, ev.side));
        }

        // ===== Offline pattern =====
        let offlineTimer = null;
        const OFFLINE_GRACE_MS = 3000;
        function showOffline() {
            document.body.classList.add('offline');
            try { if (game) game.newGame(); } catch (e) {}
        }
        function hideOffline() { document.body.classList.remove('offline'); }
        function scheduleOffline() {
            clearTimeout(offlineTimer);
            offlineTimer = setTimeout(showOffline, OFFLINE_GRACE_MS);
        }
        function cancelOffline() {
            clearTimeout(offlineTimer); offlineTimer = null;
            hideOffline();
        }

        const socket = io({
            reconnection: true, reconnectionDelay: 600, reconnectionDelayMax: 5000
        });

        async function syncFromServer() {
            let cfg = null;
            try { cfg = await fetch('/api/games/caro/config').then(r => r.json()); }
            catch (e) {}
            if (!game) ensureGame(cfg);
            else if (cfg) game.setConfig(cfg);
            socket.emit('subscribe', 'overlay');
        }

        socket.on('connect', () => {
            debugEl.textContent = 'connected';
            debugEl.classList.remove('hidden');
            setTimeout(() => debugEl.classList.add('hidden'), 2500);
            cancelOffline();
            syncFromServer();
        });

        // ★ Universal reload — App phát 'overlay:reload' khi mở/bật game → OBS source tự refresh,
        // khỏi phải Reset OBS thủ công.
        socket.on('overlay:reload', (data) => {
            if (!data || !data.gameId || data.gameId === 'caro') location.reload();
        });

        socket.on('disconnect', (reason) => {
            debugEl.textContent = 'disconnected: ' + reason;
            debugEl.classList.remove('hidden');
            scheduleOffline();
        });

        // Initial load (trước khi socket connect)
        fetch('/api/games/caro/config').then(r => r.json()).then(cfg => {
            ensureGame(cfg);
            applyDisplayCfg();
        }).catch(() => {
            ensureGame();
            showOffline();
        });

        // Config push
        socket.on('gameConfig', ({ gameId, config }) => {
            if (gameId !== 'caro') return;
            currentCfg = config;
            if (!game) ensureGame(config); else game.setConfig(config);
            applyDisplayCfg();
        });

        // State snapshot — authoritative từ App
        socket.on('gameStateSnapshot', ({ gameId, state }) => {
            if (gameId !== 'caro') return;
            ensureGame();
            if (state && game) game.loadState(state);
        });

        // Caro overlay không tự xử lý gift/comment — App là authoritative,
        // App parse comment, place stone, rồi POST state → overlay nhận snapshot.
    })();
    </script>
</body>
</html>
