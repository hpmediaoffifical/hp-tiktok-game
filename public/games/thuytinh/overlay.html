<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>Hủ Thủy Tinh — OBS Overlay</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<link rel="stylesheet" href="/style.css" />
<style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: transparent; overflow: hidden; }
    #stage { position: fixed; inset: 0; background: transparent; overflow: hidden; }
    #content {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(var(--scale, 1));
        transform-origin: center center;
        width: 1080px; height: 1920px;
        background: transparent;
        /* container-type cho phép cqw units → khớp app preview ↔ OBS overlay */
        container-type: inline-size;
    }
    #content img.jar-bottom, #content img.jar-glass { position: absolute; pointer-events: none; }
    #content img.jar-bottom { z-index: 2; }
    #content #game-canvas { position: absolute; inset: 0; z-index: 3; width: 100%; height: 100%; }
    #content img.jar-glass { z-index: 4; }
    #content #fx-canvas { position: absolute; inset: 0; z-index: 5; width: 100%; height: 100%; pointer-events: none; }
    #content .stage-overlays { position: absolute; inset: 0; z-index: 6; pointer-events: none; }
    .jar-count {
        position: absolute; z-index: 7;
        color: #fff; font-family: Arial, sans-serif;
        font-weight: 800; font-size: 56px;
        text-shadow: 0 4px 10px rgba(0,0,0,0.75);
        pointer-events: none;
        transform: translate(-50%, 0);
        display: none;
    }
    .debug-pill {
        position: fixed; bottom: 8px; left: 8px;
        background: rgba(0,0,0,0.5);
        color: #fff; font: 11px/1.2 monospace;
        padding: 4px 8px; border-radius: 6px;
        z-index: 9999; opacity: 0.5;
    }
    .debug-pill.hidden { display: none; }

    /* === Offline state: HOÀN TOÀN TRONG SUỐT khi App đóng ===
       Yêu cầu UX: không có UI, không có khung, không có thông báo gì.
       Toàn bộ #content (hũ + canvas + panels) bị ẩn → OBS browser source thấy nền trong.
       Như vậy không ảnh hưởng livestream của user. */
    body.offline #content { display: none; }
    body.offline #stage { background: transparent; }
    body.offline .debug-pill { display: none !important; }
</style>
</head>
<body>
    <div id="stage">
        <div id="content">
            <img class="jar-bottom" src="/assets/thuytinh/jar-bottom.png" />
            <canvas id="game-canvas" width="1080" height="1920"></canvas>
            <img class="jar-glass" src="/assets/thuytinh/ben-ngoai/jar-glass.png" />
            <canvas id="fx-canvas" width="1080" height="1920"></canvas>
            <div class="stage-overlays" id="stage-overlays"></div>
            <div class="jar-count" id="jar-count">0</div>
        </div>
    </div>
    <div class="debug-pill" id="debug">connecting…</div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="/games/thuytinh/game.js"></script>
    <script>
    (function () {
        const debugEl = document.getElementById('debug');
        const content = document.getElementById('content');
        const canvas = document.getElementById('game-canvas');
        const fxCanvas = document.getElementById('fx-canvas');
        const overlayLayer = document.getElementById('stage-overlays');
        const bottomEl = document.querySelector('.jar-bottom');
        const glassEl = document.querySelector('.jar-glass');
        const countEl = document.getElementById('jar-count');

        bottomEl.style.width = '100%'; bottomEl.style.height = '100%';
        glassEl.style.width = '100%'; glassEl.style.height = '100%';

        function fitScale() {
            const w = window.innerWidth, h = window.innerHeight;
            const s = Math.min(w / 1080, h / 1920);
            content.style.setProperty('--scale', String(s));
        }
        window.addEventListener('resize', fitScale);
        fitScale();
        setTimeout(() => debugEl.classList.add('hidden'), 5000);

        let game = null;
        function ensureGame(cfg) {
            if (game) return;
            // mirrorMode: true → OBS chỉ render, không tự chạy trigger logic.
            // Mọi animation đặc biệt (trộm, OSIN, hiệu ứng) chạy qua gameCmd từ App.
            // → Đảm bảo OBS đồng bộ 100% với App preview.
            game = HpGame.thuytinh.create({
                canvas, fxCanvas, overlayLayer,
                jarBottomEl: bottomEl, jarGlassEl: glassEl,
                countDisplay: countEl,
                mirrorMode: true,
                config: cfg || HpGame.thuytinh.defaultConfig()
            });
        }

        // ===== Connection lifecycle =====
        // Khi App đóng (server tắt) → socket disconnect → sau 3s grace, ẨN HOÀN TOÀN content.
        // OBS browser source sẽ chỉ thấy nền trong suốt → không ảnh hưởng livestream.
        // Khi App mở lại, socket reconnect → hiện lại + fetch state mới.
        let offlineTimer = null;
        const OFFLINE_GRACE_MS = 3000;
        function showOffline() {
            // Đặt body.offline → CSS ẩn #content (hũ + canvas + panels)
            document.body.classList.add('offline');
            // Clear local state — tránh stale frame khi reconnect
            try {
                if (game) {
                    game.clearAll();
                    game.resetSession();
                }
            } catch (e) { /* ignore */ }
        }
        function hideOffline() {
            document.body.classList.remove('offline');
        }
        function scheduleOffline() {
            clearTimeout(offlineTimer);
            offlineTimer = setTimeout(showOffline, OFFLINE_GRACE_MS);
        }
        function cancelOffline() {
            clearTimeout(offlineTimer); offlineTimer = null;
            hideOffline();
        }

        const socket = io({
            reconnection: true,
            reconnectionDelay: 600,
            reconnectionDelayMax: 5000
        });

        // === Sequential init / reconnect flow ===
        // BUG cũ: subscribe + fetch chạy song song → race condition. Nếu gameStateSnapshot
        // (từ subscribe) tới TRƯỚC config fetch, ensureGame chạy với default config →
        // panels render sai (features khác nhau). Sau đó setConfig overwrite → flicker.
        //
        // FIX: chạy tuần tự: (1) await fetch config → (2) ensureGame với đúng config →
        // (3) emit subscribe → server gửi snapshot → loadState vào game đã ready.
        async function syncFromServer() {
            let cfg = null;
            try {
                cfg = await fetch('/api/games/thuytinh/config').then(r => r.json());
            } catch (e) { /* server có thể đang sập, vẫn cho phép ensureGame default */ }
            if (!game) ensureGame(cfg);
            else if (cfg) game.setConfig(cfg);
            // SAU khi game ready với config đúng → subscribe để nhận state snapshot
            socket.emit('subscribe', 'overlay');
        }

        socket.on('connect', () => {
            debugEl.textContent = 'connected';
            debugEl.classList.remove('hidden');
            setTimeout(() => debugEl.classList.add('hidden'), 2500);
            cancelOffline();
            syncFromServer();
        });

        socket.on('disconnect', (reason) => {
            debugEl.textContent = 'disconnected: ' + reason;
            debugEl.classList.remove('hidden');
            scheduleOffline();
        });

        socket.on('reconnect_attempt', () => {
            debugEl.textContent = 'reconnecting...';
        });

        // Initial load (page load lần đầu, trước khi socket connect xong)
        // socket.on('connect') sẽ chạy syncFromServer() sau khi kết nối. Nhưng để game
        // hiển thị càng sớm càng tốt nếu socket chậm, fetch config ngay:
        fetch('/api/games/thuytinh/config').then(r => r.json()).then(cfg => {
            ensureGame(cfg);
        }).catch(() => {
            ensureGame();
            showOffline();
        });

        socket.on('gameConfig', ({ gameId, config }) => {
            if (gameId !== 'thuytinh') return;
            // Đảm bảo game tồn tại với config được gửi — tránh race với fetch initial
            if (!game) {
                ensureGame(config);
            } else {
                game.setConfig(config);
            }
        });

        // Khi overlay reset/reload hoặc subscribe → server gửi snapshot để khôi phục state
        socket.on('gameStateSnapshot', ({ gameId, state }) => {
            if (gameId !== 'thuytinh') return;
            ensureGame();
            if (state && game) game.loadState(state);
        });

        function handleGift(g) {
            ensureGame();
            game.drop({
                giftId: String(g.giftId || ''),
                giftName: g.sheetItem?.name || g.giftName,
                image: g.sheetItem?.image || g.image || g.giftPicture,
                coinValue: g.coinValue || g.sheetItem?.diamond || 1,
                userId: g.userId,
                uniqueId: g.uniqueId,
                nickname: g.nickname,
                profilePicture: g.profilePicture
            }, g.repeatCount || 1);
            debugEl.classList.remove('hidden');
            debugEl.textContent = `+ ${g.giftName} x${g.repeatCount || 1}`;
            setTimeout(() => debugEl.classList.add('hidden'), 2500);
        }
        // Chỉ listen 1 event để tránh duplicate (server emit cả 'gift' broadcast + 'gameGift' vào room overlay)
        socket.on('gift', handleGift);

        // Cache giftSheet để renderBadges() lookup metadata (image, name) cho gifts đã gán effect
        socket.on('giftSheet', (data) => {
            window.__giftSheet = Array.isArray(data) ? data : [];
            // Trigger re-render badges nếu game đã ready
            if (game && typeof game.setConfig === 'function') {
                try { game.setConfig({}); } catch (e) {}
            }
        });

        // Lệnh điều khiển từ App (authoritative) — OBS replay 1:1 mọi action.
        // App đẩy đủ payload (user info, mode...) để OBS hiển thị cùng nội dung.
        //
        // DEDUP theo seq: tránh duplicate spawn khi
        //   (1) OBS cache stale code cũ từng gây 1 quà ra 2 trộm
        //   (2) socket reconnect re-attach listener
        //   (3) browser source nhân bản scene → 2 overlay cùng render
        // Server gán seq monotonic. Overlay nhớ 50 seq cuối, skip nếu đã thấy.
        const seenSeqs = new Set();
        const seqOrder = [];
        // Defensive dedup #2: cmd-type + payload-hash trong cửa sổ 800ms — chặn duplicate khi seq
        // bị mất (vd server restart reset seq counter, OBS browser source duplicate).
        const recentCmdHashes = new Map();   // hash → timestamp
        socket.on('gameCmd', ({ gameId, cmd, payload, seq }) => {
            if (gameId !== 'thuytinh' || !game) return;
            // Dedup nếu có seq (cmd cũ không có → vẫn process — backward compat)
            if (seq != null) {
                if (seenSeqs.has(seq)) return;
                seenSeqs.add(seq);
                seqOrder.push(seq);
                if (seqOrder.length > 50) {
                    const old = seqOrder.shift();
                    seenSeqs.delete(old);
                }
            }
            // Dedup phụ: same cmd+payload trong 800ms → bỏ qua
            const now = Date.now();
            const hashKey = cmd + ':' + JSON.stringify(payload?.thieves?.map(t=>t.uid) || payload?.uid || payload?.name || '');
            const lastTs = recentCmdHashes.get(hashKey);
            if (lastTs && (now - lastTs) < 800) return;
            recentCmdHashes.set(hashKey, now);
            // Cleanup map cũ (giữ tối đa 30 entries)
            if (recentCmdHashes.size > 30) {
                const oldestKey = recentCmdHashes.keys().next().value;
                recentCmdHashes.delete(oldestKey);
            }
            if (cmd === 'thief') {
                // payload có thể là 1 object userInfo, hoặc {thieves:[...]}.
                const thieves = (payload && payload.thieves && payload.thieves.length)
                    ? payload.thieves
                    : [payload || {}];
                thieves.forEach((t, i) => setTimeout(() => game.triggerThief(t), i * 400));
            }
            else if (cmd === 'osin') game.triggerOsin(payload || {});
            else if (cmd === 'ufo') game.triggerUFO(payload || {});
            else if (cmd === 'kickJar') { if (game.fxKickJar) game.fxKickJar(payload || {}); }
            else if (cmd === 'throwJar') { if (game.fxThrowJar) game.fxThrowJar(payload || {}); }
            else if (cmd === 'joinPolice') {
                // User gia nhập / rời lực lượng CS — payload là userInfo
                if (typeof game.togglePoliceMembership === 'function') {
                    game.togglePoliceMembership(payload || {});
                }
            }
            else if (cmd === 'fireworks') game.fxFireworks();
            else if (cmd === 'tornado') game.fxTornado();
            else if (cmd === 'megaboom') game.fxMegaboom();
            else if (cmd === 'tilt') game.fxTilt();
            else if (cmd === 'pourOut') { if (game.fxPourOut) game.fxPourOut(); }
            else if (cmd === 'gravflip') game.fxGravFlip();
            else if (cmd === 'shake') game.shake();
            else if (cmd === 'slow') { if (game.fxSlow) game.fxSlow(); }
            else if (cmd === 'rain') { if (game.fxRain) game.fxRain(); }
            else if (cmd === 'geyser') { if (game.fxGeyser) game.fxGeyser(); }
            else if (cmd === 'magnet') { if (game.fxMagnet) game.fxMagnet(); }
            else if (cmd === 'wind') { if (game.fxWind) game.fxWind(); }
            else if (cmd === 'crackJar') { if (game.fxCrackJar) game.fxCrackJar(); }
            else if (cmd === 'stealJar') { if (game.fxStealJar) game.fxStealJar(); }
            else if (cmd === 'spinJar') { if (game.fxSpinJar) game.fxSpinJar(payload || {}); }
            else if (cmd === 'zigzagLuck') { if (game.fxZigzagLuck) game.fxZigzagLuck(payload || {}); }
            else if (cmd === 'combo') { if (game.fxCombo) game.fxCombo(payload || {}); }
            else if (cmd === 'shape') { if (game.fxShape) game.fxShape(payload || {}); }
            else if (cmd === 'clear') game.clearAll();
            else if (cmd === 'resetSession') game.resetSession();
            else if (cmd === 'bail') {
                const uid = payload?.uid;
                if (uid) game.bailUser(uid);
            }
        });
    })();
    </script>
</body>
</html>
